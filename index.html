<style>
/* ── Horizon variables ───────────────────────────────────────────────────── */
:root {
  --sky:          #95B7D4;
  --skyPale:      #C8D8E5;
  --terra:        #C56838;
  --terraDeep:    #9E4A24;
  --terraSoft:    #E08A5A;
  --sand:         #B89A78;
  --sandPale:     #D6C4A8;
  --cream:        #EBDDC4;
  --creamPale:    #F4EBD7;
  --ink:          #1A140F;
  --inkSoft:      #3A2C20;
  --success:      #7A8E58;

  --bg:           #F4EBD7;
  --surface:      #FAF3E0;
  --elevated:     #FFFFFF;
  --text:         #1A140F;
  --muted:        rgba(26,20,15,.68);
  --subtle:       rgba(26,20,15,.45);
  --border:       rgba(26,20,15,.11);
  --border-strong:rgba(26,20,15,.22);

  --ff-d: 'Fraunces', Georgia, serif;
  --ff-u: 'Inter', system-ui, sans-serif;
  --ff-m: ui-monospace, 'SF Mono', Menlo, monospace;

  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 18px;
  --r-xl: 24px;

  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:       #1A140F;
    --surface:  #241A12;
    --elevated: #332518;
    --text:     #EBDDC4;
    --muted:    rgba(235,221,196,.68);
    --subtle:   rgba(235,221,196,.45);
    --border:   rgba(235,221,196,.11);
    --border-strong: rgba(235,221,196,.22);
    --terra:    #E08A5A;
    --terraDeep:#C56838;
    --success:  #9CB079;
    --sky:      #C8D8E5;
  }
}

/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--ff-u); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

/* ── Layout ──────────────────────────────────────────────────────────────── */
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 10px calc(12px + var(--safe-bottom));
  overflow: hidden;
}

/* ── Top bar ─────────────────────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0 8px;
  flex-shrink: 0;
}

.topbar-title {
  font-family: var(--ff-d);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -.5px;
  color: var(--text);
}

.topbar-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--terra);
}

.topbar-sub {
  font-family: var(--ff-m);
  font-size: 10px;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: var(--terraDeep);
  margin-top: 1px;
}

/* ── Slot row ────────────────────────────────────────────────────────────── */
.slots {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.slot {
  flex: 1;
  border-radius: var(--r-md);
  padding: 7px 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: background .15s, border-color .15s;
  min-height: 46px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  -webkit-user-select: none; user-select: none;
}

.slot.active {
  background: var(--creamPale);
  border-color: var(--terra);
  border-width: 1.5px;
}
@media (prefers-color-scheme: dark) {
  .slot.active { background: rgba(197,104,56,.18); }
}

.slot.empty .slot-icon {
  font-size: 16px;
  color: var(--subtle);
  text-align: center;
}

.slot-name {
  font-family: var(--ff-u);
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}

.slot-meta {
  font-family: var(--ff-m);
  font-size: 9px;
  letter-spacing: .8px;
  color: var(--subtle);
  margin-top: 1px;
  text-transform: uppercase;
}

.slot-del {
  position: absolute;
  top: 3px; right: 3px;
  width: 16px; height: 16px;
  border: none; background: none;
  cursor: pointer;
  color: var(--subtle);
  font-size: 14px;
  line-height: 1;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  padding: 0;
}
.slot-del:active { color: var(--terra); }

/* ── BINGO letters ───────────────────────────────────────────────────────── */
.bingo-letters {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  margin-bottom: 3px;
  flex-shrink: 0;
}

.bingo-letter {
  text-align: center;
  font-family: var(--ff-d);
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -.5px;
  color: var(--terra);
}

/* ── BINGO win banner ────────────────────────────────────────────────────── */
.bingo-win {
  background: var(--creamPale);
  border: 1.5px solid var(--terra);
  border-radius: var(--r-md);
  padding: 8px;
  text-align: center;
  font-family: var(--ff-d);
  font-size: 20px;
  font-weight: 600;
  color: var(--terraDeep);
  margin-bottom: 5px;
  flex-shrink: 0;
  animation: pop .3s ease;
}
@media (prefers-color-scheme: dark) {
  .bingo-win { background: rgba(197,104,56,.2); color: var(--terra); }
}

@keyframes pop {
  0%   { transform: scale(.9); opacity: 0; }
  60%  { transform: scale(1.04); }
  100% { transform: scale(1); opacity: 1; }
}

/* ── Grid ────────────────────────────────────────────────────────────────── */
.grid-wrap {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  flex: 1;
  min-height: 0;
}

.cell {
  border-radius: var(--r-sm);
  border: 0.5px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 3px 2px;
  cursor: pointer;
  transition: background .12s, border-color .12s, box-shadow .12s;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
  touch-action: manipulation;
}

.cell:active { transform: scale(.96); }

.cell.free {
  background: var(--sandPale);
  border-color: var(--sand);
  cursor: default;
}
@media (prefers-color-scheme: dark) {
  .cell.free { background: rgba(184,154,120,.2); }
}

.cell.marked {
  background: var(--creamPale);
  border: 1.5px solid var(--terra);
  box-shadow: 0 3px 10px rgba(197,104,56,.28);
}
@media (prefers-color-scheme: dark) {
  .cell.marked {
    background: rgba(197,104,56,.2);
    border-color: var(--terra);
    box-shadow: 0 3px 10px rgba(224,138,90,.25);
  }
}

.cell.bingo-line {
  background: var(--success);
  border-color: var(--success);
  box-shadow: 0 2px 8px rgba(122,142,88,.35);
}
@media (prefers-color-scheme: dark) {
  .cell.bingo-line { background: var(--success); }
}

.cell-song {
  font-family: var(--ff-d);
  font-size: 9px;
  font-style: italic;
  font-weight: 400;
  line-height: 1.25;
  text-align: center;
  color: var(--text);
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.cell.marked .cell-song,
.cell.bingo-line .cell-song {
  font-weight: 500;
  color: var(--terraDeep);
}
@media (prefers-color-scheme: dark) {
  .cell.marked .cell-song { color: var(--terra); }
  .cell.bingo-line .cell-song { color: #fff; }
}

.cell-cat {
  font-family: var(--ff-m);
  font-size: 7px;
  letter-spacing: .4px;
  text-transform: uppercase;
  color: var(--subtle);
  text-align: center;
  margin-top: 2px;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  max-width: 100%;
}

.cell.free .cell-song {
  font-style: italic;
  font-weight: 500;
  color: var(--muted);
  font-size: 10px;
}

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;

}

.empty-icon {

}

.empty-text {
  font-family: var(--ff-d);
  font-size: 17px;
  font-style: italic;

  text-align: center;
}

/* ── Actions ─────────────────────────────────────────────────────────────── */
.actions {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  flex-shrink: 0;
}

.btn {
  flex: 1;
  font-family: var(--ff-u);
  font-size: 13px;
  font-weight: 500;
  padding: 11px 10px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--border-strong);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  transition: background .12s;
  -webkit-user-select: none; user-select: none;
}

.btn:active { background: var(--sandPale); }

.btn.primary {
  background: var(--terra);
  border-color: var(--terra);
  color: var(--creamPale);
}
@media (prefers-color-scheme: dark) {
  .btn.primary { color: var(--ink); }
}
.btn.primary:active { background: var(--terraDeep); border-color: var(--terraDeep); }

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,20,15,.55);
  display: flex; align-items: flex-end; justify-content: center;
  z-index: 100;
  animation: fadeIn .15s ease;
}

.modal {
  background: var(--elevated);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  padding: 20px 20px calc(20px + var(--safe-bottom));
  width: 100%;
  max-width: 480px;
  animation: slideUp .2s ease;
}

@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0 } to { transform: none; opacity: 1 } }

.modal-title {
  font-family: var(--ff-d);
  font-size: 19px;
  font-weight: 600;
  letter-spacing: -.3px;
  margin-bottom: 6px;
  color: var(--text);
}

.modal-body {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 18px;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: 8px;
}

/* ── Info footer ─────────────────────────────────────────────────────────── */
.info-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 6px 0 2px;
  flex-shrink: 0;
}

.info-dot {
  font-family: var(--ff-m);
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--subtle);
}

/* ── Install banner ──────────────────────────────────────────────────────── */
.install-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.install-text {
  flex: 1;
  font-size: 12px;
  color: var(--muted);
  line-height: 1.4;
}

.install-text strong {
  color: var(--text);
  font-weight: 600;
}

.install-close {
  background: none;
  border: none;
  color: var(--subtle);
  font-size: 18px;
  cursor: pointer;
  padding: 2px 4px;
  flex-shrink: 0;
}
</style>

<body>
<div id="app"></div>

<script>
// ─── Horizon: MPK Loreley 2026 ────────────────────────────────────────────
const CATEGORIES = [
  { name: 'Traces',           max: 5, main: true,  songs: ['The One','Love Found Us','Keep Hope Alive','Crossfire','Got Your Back','Healing','Symphony of Peace','Run Free','Traces','Calcutta Angel','Wildflower','The Day My Daddy Died','Glorious'] },
  { name: 'B.O.A.T.S',        max: 3, main: false, songs: ['Boats','Running Blind','Throwback','Paragliding','Earthquake','The World','Thank You','Home','Best Bad Friend','Two Mothers','Good Morning Sunshine','Diamonds & Metals','Blurry Eyes','Fake Messiah','Beautiful Madness',"Mother's Day",'America','Icon','Boats – Reprise','Wonders','O.K.O',"When Sorry Ain't Good Enough"] },
  { name: 'iD',               max: 3, main: false, songs: ['Golden Age','Higher Love','New Spirit','Run Jump Fly','Land of Bliss','Free','How Do You Love','Bigger Life','Roundabouts','Awake','iD','Friends R Family','Requiem','A Little Faith','So Beautiful','Lazarus','Last Words','Et Voilà','Talk to Me','Closer','Shake Away (Acoustic)'] },
  { name: 'Human',            max: 3, main: false, songs: ['Shake Away','Little Giants','Out of Touch','Renegade','Safe Hands','Beautiful Soul','Flag','Rose of Jericho (The Waltz)','Happiness','Here to Stay'] },
  { name: 'In Exile',         max: 2, main: false, songs: ['Living in the Line of Fire','Pray, Pray, Pray','No Fuzz, No Buzz','Thanking Blessed Mary','Search for Truth','Hope','Money Making Machine','Rain of Roses','When You Sleep','Knick-Knack-Paddy-Wack','Movie'] },
  { name: 'RUAH',             max: 2, main: false, songs: ['Prologue','I Have Called You',"Don't Judas Me","Abba! Father!",'Ô Prends Mon Âme','Salve Regina','RUAH','Walk the Line','Seinn Aililiú','Holy','Agape'] },
  { name: 'Old Songs',        max: 2, main: false, songs: ["One More Freakin' Dollar",'Aresque','An Angel','House On The Ocean','Chickenpies','I Feel Love','Take My Hand','Mama','Calling Heaven','When The Last Tree…','Good Neighbor','Key To My Heart','Crisis','Looking For Love','Fell In Love With An Alien','Brother Brother','One More Song','Santa Maria'] },
  { name: 'Sing Meinen Song', max: 2, main: false, songs: ['Flüsterton','La Cintura','Die in Your Arms','Yipi','Leuchtturm','Borderline','Heimat','When She Dances','Love Goes On','MfG','Fender Freestyle'] },
  { name: 'Cover Songs',      max: 2, main: false, songs: ['Jokerman','Proud Mary',"I'm On Fire",'The Times They Are Changing','Sailing','All Who Are Thirsty','Don\'t Give Up','Amazing Grace','Motherless Child','Breaking Me','If I Should Fall Behind','Leaving On A Jet Plane','Hotel California','Space Oddity'] },
];

const FREE_IDX = 12; // center of 5×5

// ─── State ────────────────────────────────────────────────────────────────
let state = { slots: [null, null, null], active: 0, modal: null };

function loadState() {
  try {
    const s = localStorage.getItem('fanbingo_v1');
    if (s) {
      const parsed = JSON.parse(s);
      state.slots  = parsed.slots  ?? [null, null, null];
      state.active = parsed.active ?? 0;
      // Restore Sets
      state.slots = state.slots.map(slot =>
        slot ? { ...slot, marked: new Set(slot.marked) } : null
      );
    }
  } catch(e) {}
}

function saveState() {
  try {
    const toSave = {
      slots: state.slots.map(s => s ? { ...s, marked: [...s.marked] } : null),
      active: state.active
    };
    localStorage.setItem('fanbingo_v1', JSON.stringify(toSave));
  } catch(e) {}
}

// ─── Card generation ──────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateCard() {
  const pool = [];
  CATEGORIES.forEach(cat => {
    shuffle(cat.songs).slice(0, cat.max).forEach(song =>
      pool.push({ song, cat: cat.name, main: cat.main })
    );
  });
  shuffle(pool);
  const selected = pool.slice(0, 24);
  const cells = [
    ...selected.slice(0, 12),
    null,                      // FREE
    ...selected.slice(12)
  ];
  // pad if needed
  while (cells.length < 25) cells.push(null);
  return { cells, marked: new Set([FREE_IDX]) };
}

// ─── Bingo detection ──────────────────────────────────────────────────────
const LINES = (() => {
  const lines = [];
  for (let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => r*5+c));
  for (let c = 0; c < 5; c++) lines.push([0,1,2,3,4].map(r => r*5+c));
  lines.push([0,6,12,18,24]);
  lines.push([4,8,12,16,20]);
  return lines;
})();

function getBingoLines(marked) {
  return LINES.filter(line => line.every(i => marked.has(i)));
}

// ─── Rendering ───────────────────────────────────────────────────────────
function render() {
  const app   = document.getElementById('app');
  const card  = state.slots[state.active];
  const bLines = card ? getBingoLines(card.marked) : [];
  const bingoSet = new Set(bLines.flat());
  const hasBingo = bLines.length > 0;

  const markedCount = card ? [...card.marked].filter(i => i !== FREE_IDX).length : 0;

  // Detect iOS for install hint
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
                    || window.navigator.standalone;
  const showInstall = isIOS && !isStandalone && !localStorage.getItem('fanbingo_install_dismissed');

  app.innerHTML = `
    <div class="topbar">
      <div>
        <div class="topbar-title">Fan-<em>Bingo</em></div>
        <div class="topbar-sub">MPK · Loreley 2026</div>
      </div>
    </div>

    ${showInstall ? `
    <div class="install-banner" id="install-banner">
      <div class="install-text">
        <strong>Zum Home-Bildschirm hinzufügen:</strong>
        Teilen-Symbol → „Zum Home-Bildschirm"
      </div>
      <button class="install-close" onclick="dismissInstall()">×</button>
    </div>` : ''}

    <div class="slots">
      ${[0,1,2].map(i => {
        const s    = state.slots[i];
        const act  = i === state.active ? 'active' : '';
        const cnt  = s ? [...s.marked].filter(x => x !== FREE_IDX).length : 0;
        return s
          ? `<div class="slot ${act}" onclick="selectSlot(${i})" role="button" aria-label="Karte ${i+1}">
               <button class="slot-del" onclick="event.stopPropagation();confirmDelete(${i})">×</button>
               <div class="slot-name">Karte ${i+1}</div>
               <div class="slot-meta">${s.cells[0]?.cat.slice(0,6) ?? '—'} · ${cnt}✓</div>
             </div>`
          : `<div class="slot empty ${act}" onclick="selectSlot(${i})" role="button" aria-label="Leerer Slot ${i+1}">
               <div class="slot-icon">+</div>
               <div class="slot-name" style="text-align:center;color:var(--subtle)">Karte ${i+1}</div>
             </div>`;
      }).join('')}
    </div>

    ${card ? `
      <div class="bingo-letters">
        ${['B','I','N','G','O'].map(l => `<div class="bingo-letter">${l}</div>`).join('')}
      </div>

      ${hasBingo ? `<div class="bingo-win">🎸  BINGO!</div>` : ''}

      <div class="grid-wrap">
        <div class="grid" id="grid">
          ${card.cells.map((cell, i) => {
            const isFree   = i === FREE_IDX;
            const isMarked = card.marked.has(i);
            const isBLine  = bingoSet.has(i);
            const cls = isFree ? 'free'
                      : isBLine ? 'bingo-line'
                      : isMarked ? 'marked' : '';
            return isFree
              ? `<div class="cell free"><span class="cell-song">Free</span></div>`
              : cell
              ? `<div class="cell ${cls}" onclick="toggleCell(${i})" role="button" aria-label="${cell.song}">
                   <span class="cell-song">${escHtml(cell.song)}</span>
                   <span class="cell-cat">${escHtml(cell.cat)}</span>
                 </div>`
              : `<div class="cell"></div>`;
          }).join('')}
        </div>
      </div>
    ` : `
      <div class="empty-state">
        <div class="empty-icon">🎵</div>
        <div class="empty-text">Karte generieren<br>und los geht's!</div>
      </div>
    `}

    <div class="actions">
      ${card ? `
        <button class="btn" onclick="confirmReset()">Zurücksetzen</button>
        <button class="btn" onclick="confirmNewCard()">Neu mischen</button>
      ` : `
        <button class="btn primary" onclick="newCard()" style="flex:2">Karte generieren</button>
      `}
    </div>

    <div class="info-row">
      <span class="info-dot">Tippe auf gespielte Songs</span>
    </div>

    ${state.modal ? renderModal() : ''}
  `;

  if (card) fitCells();
}

// ─── Cell font size fitting ───────────────────────────────────────────────
function fitCells() {
  requestAnimationFrame(() => {
    const grid = document.getElementById('grid');
    if (!grid) return;
    const cellH = grid.offsetHeight / 5;
    // Scale song font between 7.5 and 11px depending on cell height
    const songPx = Math.min(11, Math.max(7.5, cellH * 0.19));
    const catPx  = Math.max(6, songPx - 1.5);
    document.querySelectorAll('.cell-song').forEach(el => el.style.fontSize = songPx + 'px');
    document.querySelectorAll('.cell-cat').forEach(el => el.style.fontSize = catPx + 'px');
  });
}

// ─── Modal ────────────────────────────────────────────────────────────────
function renderModal() {
  const m = state.modal;
  return `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">${m.title}</div>
        <div class="modal-body">${m.body}</div>
        <div class="modal-actions">
          <button class="btn" onclick="closeModal()">Abbrechen</button>
          <button class="btn ${m.danger ? '' : 'primary'}"
                  style="${m.danger ? 'color:var(--terra)' : ''}"
                  onclick="${m.action}">
            ${m.confirm}
          </button>
        </div>
      </div>
    </div>`;
}

// ─── Actions ──────────────────────────────────────────────────────────────
function selectSlot(i) {
  state.active = i;
  render();
}

function newCard() {
  state.slots[state.active] = generateCard();
  saveState();
  render();
}

function toggleCell(i) {
  const card = state.slots[state.active];
  if (!card || i === FREE_IDX) return;
  if (card.marked.has(i)) card.marked.delete(i);
  else card.marked.add(i);
  saveState();
  render();
}

function confirmNewCard() {
  state.modal = {
    title: 'Neu mischen?',
    body:  'Die aktuelle Karte und alle Markierungen werden durch eine neue Zufallskarte ersetzt.',
    confirm: 'Neu mischen',
    action: 'newCard();closeModal()'
  };
  render();
}

function confirmReset() {
  state.modal = {
    title: 'Zurücksetzen?',
    body:  'Alle Markierungen auf dieser Karte werden gelöscht.',
    confirm: 'Zurücksetzen',
    action: 'resetMarks();closeModal()'
  };
  render();
}

function confirmDelete(i) {
  state.modal = {
    title: `Karte ${i+1} löschen?`,
    body:  'Die Karte und alle Markierungen werden gelöscht.',
    confirm: 'Löschen',
    danger: true,
    action: `deleteCard(${i});closeModal()`
  };
  render();
}

function resetMarks() {
  const card = state.slots[state.active];
  if (!card) return;
  card.marked = new Set([FREE_IDX]);
  saveState();
  render();
}

function deleteCard(i) {
  state.slots[i] = null;
  if (state.active === i) state.active = state.slots.findIndex(s => s !== null);
  if (state.active < 0) state.active = 0;
  saveState();
  render();
}

function closeModal() {
  state.modal = null;
  render();
}

function dismissInstall() {
  localStorage.setItem('fanbingo_install_dismissed', '1');
  render();
}

// ─── Helpers ──────────────────────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Service worker ───────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Init ─────────────────────────────────────────────────────────────────
loadState();
render();
window.addEventListener('resize', () => { if (state.slots[state.active]) fitCells(); });
</script>
</body>
</html>
