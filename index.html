<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Fan-Bingo">

<meta name="description" content="Fan-Bingo – dein persönliches Konzert-Bingo. Selbst befüllen, teilen, spielen.">
<title>Fan-Bingo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23C8D8E5'/%3E%3Crect y='0' width='180' height='97' fill='%23C8D8E5'/%3E%3Crect y='37' width='180' height='60' fill='%2395B7D4' opacity='.6'/%3E%3Cpolygon points='0,107 34,78 63,97 97,67 131,90 165,71 180,82 180,180 0,180' fill='%23C56838'/%3E%3Crect y='137' width='180' height='43' fill='%23D6C4A8'/%3E%3Ccircle cx='50' cy='155' r='7' fill='%231A140F'/%3E%3Ccircle cx='72' cy='162' r='7' fill='%231A140F'/%3E%3Ccircle cx='94' cy='155' r='7' fill='%231A140F'/%3E%3Ccircle cx='116' cy='162' r='7' fill='none' stroke='%231A140F' stroke-width='2.5' opacity='.5'/%3E%3Ccircle cx='138' cy='155' r='7' fill='none' stroke='%231A140F' stroke-width='2.5' opacity='.5'/%3E%3C/svg%3E">

<style>
:root {
  --sky:#95B7D4;--skyPale:#C8D8E5;--terra:#C56838;--terraDeep:#9E4A24;
  --terraSoft:#E08A5A;--sand:#B89A78;--sandPale:#D6C4A8;--cream:#EBDDC4;
  --creamPale:#F4EBD7;--ink:#1A140F;--inkSoft:#3A2C20;--success:#7A8E58;
  --bg:#F4EBD7;--surface:#FAF3E0;--elevated:#FFFFFF;
  --text:#1A140F;--muted:rgba(26,20,15,.68);--subtle:rgba(26,20,15,.45);
  --border:rgba(26,20,15,.11);--border-strong:rgba(26,20,15,.22);
  --ff-d:'Fraunces',Georgia,serif;--ff-u:'Inter',system-ui,sans-serif;
  --ff-m:ui-monospace,'SF Mono',Menlo,monospace;
  --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1A140F;--surface:#241A12;--elevated:#332518;
  --text:#EBDDC4;--muted:rgba(235,221,196,.68);--subtle:rgba(235,221,196,.45);
  --border:rgba(235,221,196,.11);--border-strong:rgba(235,221,196,.22);
  --terra:#E08A5A;--terraDeep:#C56838;--success:#9CB079;--sky:#C8D8E5;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--ff-u);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;}

#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;
  padding:0 10px calc(6px + var(--safe-bottom));overflow:hidden;}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 0 6px;flex-shrink:0;}
.topbar-left{}
.topbar-title{font-family:var(--ff-d);font-size:22px;font-weight:600;letter-spacing:-.5px;color:var(--text);}
.topbar-title em{font-style:italic;font-weight:400;color:var(--terra);}
.topbar-sub{font-family:var(--ff-m);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:var(--terraDeep);margin-top:1px;}
.topbar-right{display:flex;align-items:center;gap:6px;}

/* Language toggle */
.lang-btn{font-family:var(--ff-m);font-size:10px;letter-spacing:1px;text-transform:uppercase;
  padding:4px 8px;border-radius:6px;border:1px solid var(--border-strong);
  background:transparent;color:var(--muted);cursor:pointer;}
.lang-btn.active{background:var(--terra);border-color:var(--terra);color:var(--creamPale);}
@media(prefers-color-scheme:dark){.lang-btn.active{color:var(--ink);}}

/* ── Slots ── */
.slots{display:flex;gap:6px;margin-bottom:7px;flex-shrink:0;}
.slot{flex:1;border-radius:var(--r-md);padding:7px 8px;border:1px solid var(--border);
  background:var(--surface);cursor:pointer;transition:background .15s,border-color .15s;
  min-height:46px;display:flex;flex-direction:column;justify-content:center;
  position:relative;-webkit-user-select:none;user-select:none;}
.slot.active{background:var(--creamPale);border-color:var(--terra);border-width:1.5px;}
@media(prefers-color-scheme:dark){.slot.active{background:rgba(197,104,56,.18);}}
.slot.empty .slot-icon{font-size:16px;color:var(--subtle);text-align:center;}
.slot-name{font-family:var(--ff-u);font-size:11px;font-weight:600;color:var(--text);line-height:1.2;}
.slot-meta{font-family:var(--ff-m);font-size:9px;letter-spacing:.8px;color:var(--subtle);margin-top:1px;text-transform:uppercase;}
.slot-del{position:absolute;top:3px;right:3px;width:16px;height:16px;border:none;background:none;
  cursor:pointer;color:var(--subtle);font-size:14px;line-height:1;display:flex;
  align-items:center;justify-content:center;border-radius:50%;padding:0;}
.slot-del:active{color:var(--terra);}

/* ── BINGO letters ── */
.bingo-letters{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:3px;flex-shrink:0;}
.bingo-letter{text-align:center;font-family:var(--ff-d);font-size:18px;font-weight:600;letter-spacing:-.5px;color:var(--terra);}

/* ── Win banner ── */
.bingo-win{background:var(--creamPale);border:1.5px solid var(--terra);border-radius:var(--r-md);
  padding:7px;text-align:center;font-family:var(--ff-d);font-size:20px;font-weight:600;
  color:var(--terraDeep);margin-bottom:4px;flex-shrink:0;animation:pop .3s ease;}
@media(prefers-color-scheme:dark){.bingo-win{background:rgba(197,104,56,.2);color:var(--terra);}}
@keyframes pop{0%{transform:scale(.9);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}

/* ── Grid ── */
.grid-wrap{flex:1;min-height:0;display:flex;flex-direction:column;}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;flex:1;min-height:0;}
.cell{border-radius:var(--r-sm);border:.5px solid var(--border);background:var(--surface);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:3px 2px;cursor:pointer;transition:background .12s,border-color .12s,box-shadow .12s;
  overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.cell:active{transform:scale(.96);}
.cell.free{background:var(--sandPale);border-color:var(--sand);cursor:default;}
@media(prefers-color-scheme:dark){.cell.free{background:rgba(184,154,120,.2);}}
.cell.marked{background:var(--creamPale);border:1.5px solid var(--terra);box-shadow:0 3px 10px rgba(197,104,56,.28);}
@media(prefers-color-scheme:dark){.cell.marked{background:rgba(197,104,56,.2);border-color:var(--terra);box-shadow:0 3px 10px rgba(224,138,90,.25);}}
.cell.bingo-line{background:var(--success);border-color:var(--success);box-shadow:0 2px 8px rgba(122,142,88,.35);}
.cell-song{font-family:var(--ff-d);font-size:9px;font-style:italic;font-weight:400;
  line-height:1.25;text-align:center;color:var(--text);overflow:hidden;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.cell.marked .cell-song,.cell.bingo-line .cell-song{font-weight:500;color:var(--terraDeep);}
@media(prefers-color-scheme:dark){.cell.marked .cell-song{color:var(--terra);}.cell.bingo-line .cell-song{color:#fff;}}
.cell-cat{font-family:var(--ff-m);font-size:7px;letter-spacing:.4px;text-transform:uppercase;
  color:var(--subtle);text-align:center;margin-top:2px;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis;max-width:100%;}
.cell.free .cell-song{font-style:italic;font-weight:500;color:var(--muted);font-size:10px;}

/* ── Empty state ── */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px 0;}
.empty-icon{font-size:40px;opacity:.4;}
.empty-text{font-family:var(--ff-d);font-size:16px;font-style:italic;color:var(--muted);text-align:center;}

/* ── Actions ── */
.actions{display:flex;gap:8px;margin-top:7px;flex-shrink:0;}
.btn{flex:1;font-family:var(--ff-u);font-size:13px;font-weight:500;padding:10px 8px;
  border-radius:var(--r-md);border:1.5px solid var(--border-strong);background:transparent;
  color:var(--text);cursor:pointer;transition:background .12s;-webkit-user-select:none;user-select:none;}
.btn:active{background:var(--sandPale);}
.btn.primary{background:var(--terra);border-color:var(--terra);color:var(--creamPale);}
@media(prefers-color-scheme:dark){.btn.primary{color:var(--ink);}}
.btn.primary:active{background:var(--terraDeep);border-color:var(--terraDeep);}

/* ── Footer ── */
.footer{display:flex;align-items:center;justify-content:center;gap:12px;
  padding:5px 0 2px;flex-shrink:0;flex-wrap:wrap;}
.footer a{font-family:var(--ff-m);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  color:var(--subtle);text-decoration:none;}
.footer a:hover{color:var(--terra);}
.footer-sep{font-size:9px;color:var(--subtle);}

/* ── Install banner ── */
.install-banner{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);
  padding:9px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.install-text{flex:1;font-size:11px;color:var(--muted);line-height:1.4;}
.install-text strong{color:var(--text);font-weight:600;}
.install-close{background:none;border:none;color:var(--subtle);font-size:18px;cursor:pointer;padding:2px 4px;flex-shrink:0;}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(26,20,15,.55);
  display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fadeIn .15s ease;}
.modal{background:var(--elevated);border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:20px 20px calc(20px + var(--safe-bottom));width:100%;max-width:480px;animation:slideUp .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.modal-title{font-family:var(--ff-d);font-size:19px;font-weight:600;letter-spacing:-.3px;margin-bottom:6px;color:var(--text);}
.modal-body{font-size:14px;color:var(--muted);margin-bottom:18px;line-height:1.5;}
.modal-actions{display:flex;gap:8px;}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ── Embedded song data ───────────────────────────────────────────────────
const SONGS_DATA = [
  { name:"Traces",          max:5, main:true,  songs:["The One","Love Found Us","Keep Hope Alive","Crossfire","Got Your Back","Healing","Symphony of Peace","Run Free","Traces","Calcutta Angel","Wildflower","The Day My Daddy Died","Glorious"] },
  { name:"B.O.A.T.S",       max:3, main:false, songs:["Boats","Running Blind","Throwback","Paragliding","Earthquake","The World","Thank You","Home","Best Bad Friend","Two Mothers","Good Morning Sunshine","Diamonds & Metals","Blurry Eyes","Fake Messiah","Beautiful Madness","Mother's Day","America","Icon","Boats – Reprise","Wonders","O.K.O","When Sorry Ain't Good Enough"] },
  { name:"iD",              max:3, main:false, songs:["Golden Age","Higher Love","New Spirit","Run Jump Fly","Land of Bliss","Free","How Do You Love","Bigger Life","Roundabouts","Awake","iD","Friends R Family","Requiem","A Little Faith","So Beautiful","Lazarus","Last Words","Et Voilà","Talk to Me","Closer","Shake Away (Acoustic)"] },
  { name:"Human",           max:3, main:false, songs:["Shake Away","Little Giants","Out of Touch","Renegade","Safe Hands","Beautiful Soul","Flag","Rose of Jericho (The Waltz)","Happiness","Here to Stay"] },
  { name:"In Exile",        max:2, main:false, songs:["Living in the Line of Fire","Pray, Pray, Pray","No Fuzz, No Buzz, Back to Rock'n'Roll","Thanking Blessed Mary","Search for Truth","Hope","Money Making Machine","Rain of Roses","When You Sleep","Knick-Knack-Paddy-Wack","Movie"] },
  { name:"RUAH",            max:2, main:false, songs:["Prologue","I Have Called You","Don't Judas Me","Abba! Father!","Ô Prends Mon Âme","Salve Regina (Latin)","RUAH","Walk the Line","Seinn Aililiú","Holy","Agape"] },
  { name:"Old Songs",       max:2, main:false, songs:["One More Freakin' Dollar","Aresque","An Angel","House On The Ocean","Chickenpies","I Feel Love","Take My Hand","Mama","Calling Heaven","When The Last Tree…","Good Neighbor","Key To My Heart","Crisis","Looking For Love","Fell In Love With An Alien","Brother Brother","One More Song","Santa Maria"] },
  { name:"Sing Meinen Song", max:2, main:false, songs:["Flüsterton","La Cintura","Die in Your Arms","Yipi","Leuchtturm","Borderline","Heimat","When She Dances","Love Goes On","MfG","Fender Freestyle"] },
  { name:"Cover Songs",     max:2, main:false, songs:["Jokerman","Proud Mary","I'm On Fire","The Times They Are Changing","Sailing","All Who Are Thirsty (Come, Lord Jesus)","Don't Give Up","Amazing Grace","Motherless Child","Breaking Me","If I Should Fall Behind","Leaving On A Jet Plane","Hotel California","Space Oddity"] }
];

// ── i18n strings ──────────────────────────────────────────────────────────
const I18N = {
  de: {
    appSub:       'Konzert-Bingo',
    slotCard:     'Karte',
    slotEmpty:    'Karte',
    emptyText:    'Karte generieren\nund los geht\'s!',
    generate:     'Karte generieren',
    reset:        'Zurücksetzen',
    reshuffle:    'Neu mischen',
    bingo:        '🎸  BINGO!',
    hint:         'Tippe auf gespielte Songs',
    installHint:  '<strong>Zum Home-Bildschirm:</strong> Teilen → „Zum Home-Bildschirm"',
    noArtists:    'Zuerst Kategorien anlegen.',
    confirmReshuffle: 'Neu mischen?',
    confirmReshuffleBody: 'Die aktuelle Karte und alle Markierungen werden durch eine neue Zufallskarte ersetzt.',
    confirmReset: 'Zurücksetzen?',
    confirmResetBody: 'Alle Markierungen auf dieser Karte werden gelöscht.',
    confirmDelete: 'Karte löschen?',
    confirmDeleteBody: 'Die Karte und alle Markierungen werden gelöscht.',
    cancel:       'Abbrechen',
    confirm:      'Bestätigen',
    delete:       'Löschen',
    linkReadme:   'Anleitung',
    linkPrivacy:  'Datenschutz',
    linkImprint:  'Impressum',
    free:         'Free',
  },
  en: {
    appSub:       'Concert Bingo',
    slotCard:     'Card',
    slotEmpty:    'Card',
    emptyText:    'Generate a card\nand let\'s go!',
    generate:     'Generate card',
    reset:        'Reset',
    reshuffle:    'Reshuffle',
    bingo:        '🎸  BINGO!',
    hint:         'Tap songs when they\'re played',
    installHint:  '<strong>Add to Home Screen:</strong> Share → "Add to Home Screen"',
    noArtists:    'First add some categories.',
    confirmReshuffle: 'Reshuffle?',
    confirmReshuffleBody: 'Your current card and all marks will be replaced with a new random card.',
    confirmReset: 'Reset?',
    confirmResetBody: 'All marks on this card will be cleared.',
    confirmDelete: 'Delete card?',
    confirmDeleteBody: 'This card and all its marks will be deleted.',
    cancel:       'Cancel',
    confirm:      'Confirm',
    delete:       'Delete',
    linkReadme:   'Help',
    linkPrivacy:  'Privacy',
    linkImprint:  'Imprint',
    free:         'Free',
  }
};

// ── State ─────────────────────────────────────────────────────────────────
const FREE_IDX = 12;
let state = { slots:[null,null,null], active:0, modal:null, lang:'de' };

function t(key){ return I18N[state.lang][key] ?? key; }

function loadState(){
  try{
    const s = localStorage.getItem('fanbingo_v2');
    if(s){
      const p = JSON.parse(s);
      state.slots  = (p.slots  ?? [null,null,null]).map(s => s ? {...s, marked:new Set(s.marked)} : null);
      state.active = p.active ?? 0;
      state.lang   = p.lang   ?? (navigator.language?.startsWith('en') ? 'en' : 'de');
    } else {
      state.lang = navigator.language?.startsWith('en') ? 'en' : 'de';
    }
  }catch(e){}
}

function saveState(){
  try{
    localStorage.setItem('fanbingo_v2', JSON.stringify({
      slots: state.slots.map(s => s ? {...s, marked:[...s.marked]} : null),
      active: state.active,
      lang: state.lang
    }));
  }catch(e){}
}

// ── Card generation ───────────────────────────────────────────────────────
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }

const LINES = (()=>{
  const l=[];
  for(let r=0;r<5;r++) l.push([0,1,2,3,4].map(c=>r*5+c));
  for(let c=0;c<5;c++) l.push([0,1,2,3,4].map(r=>r*5+c));
  l.push([0,6,12,18,24]); l.push([4,8,12,16,20]);
  return l;
})();

function getBingoLines(marked){ return LINES.filter(line=>line.every(i=>marked.has(i))); }

// ── Render ────────────────────────────────────────────────────────────────
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render(){
  const card  = state.slots[state.active];
  const bLines = card ? getBingoLines(card.marked) : [];
  const bingoSet = new Set(bLines.flat());
  const hasBingo = bLines.length > 0;
  const markedCount = card ? [...card.marked].filter(i=>i!==FREE_IDX).length : 0;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const showInstall = isIOS && !isStandalone && !localStorage.getItem('fanbingo_install_dismissed');
  const lang = state.lang;

  document.documentElement.lang = lang;

  document.getElementById('app').innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Fan-<em>Bingo</em></div>
        <div class="topbar-sub">${t('appSub')}</div>
      </div>
      <div class="topbar-right">
        <button class="lang-btn ${lang==='de'?'active':''}" onclick="setLang('de')">DE</button>
        <button class="lang-btn ${lang==='en'?'active':''}" onclick="setLang('en')">EN</button>
      </div>
    </div>

    ${showInstall ? `<div class="install-banner" id="install-banner">
      <div class="install-text">${t('installHint')}</div>
      <button class="install-close" onclick="dismissInstall()">×</button>
    </div>` : ''}

    <div class="slots">
      ${[0,1,2].map(i=>{
        const s   = state.slots[i];
        const act = i===state.active ? 'active' : '';
        const cnt = s ? [...s.marked].filter(x=>x!==FREE_IDX).length : 0;
        return s
          ? `<div class="slot ${act}" onclick="selectSlot(${i})" role="button">
               <button class="slot-del" onclick="event.stopPropagation();confirmDelete(${i})">×</button>
               <div class="slot-name">${t('slotCard')} ${i+1}</div>
               <div class="slot-meta">${(s.cells[0]?.cat??'').slice(0,7)} · ${cnt}✓</div>
             </div>`
          : `<div class="slot empty ${act}" onclick="selectSlot(${i})" role="button">
               <div class="slot-icon">+</div>
               <div class="slot-name" style="text-align:center;color:var(--subtle)">${t('slotEmpty')} ${i+1}</div>
             </div>`;
      }).join('')}
    </div>

    ${card ? `
      <div class="bingo-letters">
        ${['B','I','N','G','O'].map(l=>`<div class="bingo-letter">${l}</div>`).join('')}
      </div>
      ${hasBingo ? `<div class="bingo-win">${t('bingo')}</div>` : ''}
      <div class="grid-wrap">
        <div class="grid" id="grid">
          ${card.cells.map((cell,i)=>{
            const isFree  = i===FREE_IDX;
            const isMarked= card.marked.has(i);
            const isBLine = bingoSet.has(i);
            const cls = isFree?'free':isBLine?'bingo-line':isMarked?'marked':'';
            return isFree
              ? `<div class="cell free"><span class="cell-song">${t('free')}</span></div>`
              : cell
              ? `<div class="cell ${cls}" onclick="toggleCell(${i})" role="button" aria-label="${esc(cell.song)}">
                   <span class="cell-song">${esc(cell.song)}</span>
                   <span class="cell-cat">${esc(cell.cat)}</span>
                 </div>`
              : `<div class="cell"></div>`;
          }).join('')}
        </div>
      </div>
    ` : `
      <div class="empty-state">
        <div class="empty-icon">🎵</div>
        <div class="empty-text">${t('emptyText').replace('\n','<br>')}</div>
      </div>
    `}

    <div class="actions">
      ${card
        ? `<button class="btn" onclick="confirmReset()">${t('reset')}</button>
           <button class="btn" onclick="confirmReshuffle()">${t('reshuffle')}</button>`
        : `<button class="btn primary" onclick="newCard()" style="flex:2">${t('generate')}</button>`
      }
    </div>

    <div class="footer">
      <a href="readme.html">${t('linkReadme')}</a>
      <span class="footer-sep">·</span>
      <a href="privacy.html">${t('linkPrivacy')}</a>
      <span class="footer-sep">·</span>
      <a href="impressum.html">${t('linkImprint')}</a>
    </div>

    ${state.modal ? renderModal() : ''}
  `;

  if(card) fitCells();
}

function fitCells(){
  requestAnimationFrame(()=>{
    const g = document.getElementById('grid');
    if(!g) return;
    const h = g.offsetHeight/5;
    const sp = Math.min(11,Math.max(7.5,h*0.19));
    const cp = Math.max(6,sp-1.5);
    document.querySelectorAll('.cell-song').forEach(el=>el.style.fontSize=sp+'px');
    document.querySelectorAll('.cell-cat').forEach(el=>el.style.fontSize=cp+'px');
  });
}

// ── Modal ─────────────────────────────────────────────────────────────────
function renderModal(){
  const m = state.modal;
  return `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-title">${m.title}</div>
      <div class="modal-body">${m.body}</div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">${t('cancel')}</button>
        <button class="btn ${m.danger?'':'primary'}" style="${m.danger?'color:var(--terra)':''}" onclick="${m.action}">
          ${m.danger ? t('delete') : t('confirm')}
        </button>
      </div>
    </div>
  </div>`;
}

// ── Actions ───────────────────────────────────────────────────────────────
function selectSlot(i){ state.active=i; render(); }
function setLang(l){ state.lang=l; saveState(); render(); }

function newCard(){
  const cats = SONGS_DATA;
  const pool=[];
  cats.forEach(cat=>{
    shuffle(cat.songs).slice(0,cat.max).forEach(song=>
      pool.push({song,cat:cat.name,main:cat.main}));
  });
  shuffle(pool);
  const selected=pool.slice(0,24);
  const cells=[...selected.slice(0,12),null,...selected.slice(12)];
  while(cells.length<25) cells.push(null);
  state.slots[state.active]={cells,marked:new Set([FREE_IDX])};
  saveState(); render();
}

function toggleCell(i){
  const card=state.slots[state.active];
  if(!card||i===FREE_IDX) return;
  if(card.marked.has(i)) card.marked.delete(i); else card.marked.add(i);
  saveState(); render();
}

function confirmReshuffle(){ state.modal={title:t('confirmReshuffle'),body:t('confirmReshuffleBody'),confirm:t('confirm'),action:'newCard();closeModal()'}; render(); }
function confirmReset(){ state.modal={title:t('confirmReset'),body:t('confirmResetBody'),confirm:t('confirm'),action:'resetMarks();closeModal()'}; render(); }
function confirmDelete(i){ state.modal={title:t('confirmDelete'),body:t('confirmDeleteBody'),danger:true,action:`deleteCard(${i});closeModal()`}; render(); }

function resetMarks(){ const c=state.slots[state.active]; if(!c)return; c.marked=new Set([FREE_IDX]); saveState(); render(); }
function deleteCard(i){ state.slots[i]=null; if(state.active===i){ const f=state.slots.findIndex(s=>s!==null); state.active=f<0?0:f; } saveState(); render(); }
function closeModal(){ state.modal=null; render(); }
function dismissInstall(){ localStorage.setItem('fanbingo_install_dismissed','1'); render(); }

// ── Service Worker ────────────────────────────────────────────────────────
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js').catch(()=>{}); }

// ── Init ──────────────────────────────────────────────────────────────────
loadState();
render();
window.addEventListener('resize',()=>{ if(state.slots[state.active]) fitCells(); });
</script>
</body>
</html>
